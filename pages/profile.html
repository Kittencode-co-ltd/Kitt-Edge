<div class="page" id="profilePage">

    <div class="profile-header">
        <!-- Profile Avatar with Upload Functionality -->
        <div class="profile-avatar" onclick="document.getElementById('profileImageUpload').click()">
            <img id="profileImagePreview" src="assets/images/avatar.png" alt="Profile" style="display: none;"
                onerror="this.style.display='none'; document.getElementById('defaultAvatarIcon').style.display='block';">
            <i id="defaultAvatarIcon" class="fas fa-user" style="font-size: 50px; color: #fff; line-height: 100px;"></i>
            <div class="avatar-upload-overlay">
                <i class="fas fa-camera"></i>
            </div>
        </div>
        <input type="file" id="profileImageUpload" accept="image/*" style="display: none;"
            onchange="MobileApp.handleProfileImageUpload(event)">

        <h2 id="profileDisplayName">Kitten</h2>
        <p class="profile-tier premium">Premium Member</p>
    </div>
    <div class="profile-menu">
        <div class="menu-item" onclick="MobileApp.navigate('profile-setup')">
            <i class="fas fa-user"></i>
            <span>แก้ไขโปรไฟล์</span>
            <i class="fas fa-chevron-right"></i>
        </div>
        <div class="menu-item">
            <i class="fas fa-cog"></i>
            <span>ตั้งค่า</span>
            <i class="fas fa-chevron-right"></i>
        </div>
        <div class="menu-item" onclick="MobileApp.navigate('subscription')">
            <i class="fas fa-credit-card"></i>
            <span>การสมัครสมาชิก</span>
            <i class="fas fa-chevron-right"></i>
        </div>
        <div class="menu-item">
            <i class="fas fa-question-circle"></i>
            <span>ช่วยเหลือ</span>
            <i class="fas fa-chevron-right"></i>
        </div>
        <div class="menu-item logout">
            <i class="fas fa-sign-out-alt"></i>
            <span>ออกจากระบบ</span>
        </div>
    </div>
</div>
