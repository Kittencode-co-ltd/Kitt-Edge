<div class="page" id="authPage">
    <div class="auth-container">
        <!-- Logo Header -->
        <div class="auth-header">
            <div class="auth-logo">
                <img src="img/logo.png" alt="KITT-EDGE Logo" style="width:72px;height:72px;object-fit:contain;">
            </div>
        </div>

        <!-- Auth Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="AuthApp.switchTab('login')">เข้าสู่ระบบ</button>
            <button class="auth-tab" onclick="AuthApp.switchTab('register')">สมัครสมาชิก</button>
        </div>

        <!-- Forms -->
        <div class="auth-body">
            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>อีเมล หรือ ชื่อผู้ใช้</label>
                    <input type="email" placeholder="example@email.com" class="form-input">
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" placeholder="••••••••" class="form-input">
                </div>
                <div class="auth-forgot-password">
                    <a href="#">ลืมรหัสผ่าน?</a>
                </div>
                <button class="btn btn-primary btn-block auth-submit-btn" onclick="AuthApp.login()">เข้าสู่ระบบ</button>

                <div class="auth-divider">
                    <span>หรือเข้าสู่ระบบด้วย</span>
                </div>

                <div class="social-auth">
                    <button class="social-btn google"><i class="fa-brands fa-google"></i></button>
                    <button class="social-btn facebook"><i class="fa-brands fa-facebook"></i></button>
                    <button class="social-btn apple"><i class="fa-brands fa-apple"></i></button>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>ชื่อ-นามสกุล</label>
                    <input type="text" placeholder="ชื่อ นามสกุล" class="form-input">
                </div>
                <div class="form-group">
                    <label>อีเมล</label>
                    <input type="email" placeholder="example@email.com" class="form-input">
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" placeholder="สร้างรหัสผ่าน 8 ตัวอักษรขึ้นไป" class="form-input">
                </div>
                <button class="btn btn-primary btn-block auth-submit-btn mt-4"
                    onclick="AuthApp.register()">สร้างบัญชีฟรี</button>
                <p class="auth-terms">การสมัครสมาชิกถือว่าคุณยอมรับ <a href="#">ข้อตกลงการใช้งาน</a> และ <a
                        href="#">นโยบายความเป็นส่วนตัว</a></p>
            </div>
        </div>
    </div>
</div>
