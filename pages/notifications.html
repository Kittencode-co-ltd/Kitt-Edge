<div class="page" id="notificationsPage" style="background: var(--bg-primary); overflow-y: auto; height: 100%;">
    <!-- Header -->
    <div class="notifications-header">
        <div class="notifications-header-left">
            <button class="icon-btn back-btn" onclick="MobileApp.navigate('dashboard')">
                <i class="fas fa-chevron-left" style="color: var(--text-primary);"></i>
            </button>
            <h2 style="font-size: 20px; font-weight: 700; color: var(--text-primary); margin: 0;">การแจ้งเตือน</h2>
        </div>
        <div class="notifications-header-right">
            <button class="icon-btn" onclick="MobileApp.markAllNotificationsRead()" style="color: var(--text-muted); font-size: 14px;">
                <i class="fas fa-check-double"></i>
            </button>
            <button class="icon-btn" style="color: var(--text-primary);">
                <i class="fas fa-search"></i>
            </button>
            <button class="icon-btn" style="color: var(--text-primary);">
                <i class="fas fa-ellipsis-v"></i>
            </button>
        </div>
    </div>

    <!-- Filter Pills (YouTube style) -->
    <div class="notifications-filter-bar">
        <button class="filter-pill active">ทั้งหมด</button>
        <button class="filter-pill">พูดถึงคุณ</button>
        <button class="filter-pill">คอร์สเรียน</button>
    </div>

    <!-- Notifications List Container -->
    <div id="notificationsList" class="notifications-list">
        <!-- JS rendered items will go here -->
    </div>
</div>
